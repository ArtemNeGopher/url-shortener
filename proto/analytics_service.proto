syntax = "proto3";

package analytics;

option go_package = "pkg/genproto/analytics";

import "google/protobuf/timestamp.proto";

service AnalyticsService {
  rpc RecordClick(ClickEvent) returns (ClickResponse);
  rpc GetStatistics(StatsRequest) returns (StatsResponse);
}

message ClickEvent {
  string short_code = 1;
  string ip_address = 2;
  string user_agent = 3;
  string referer = 4;
  google.protobuf.Timestamp clicked_at = 5;
}

message ClickResponse {
  bool success = 1;
}

message StatsRequest {
  string short_code = 1;
}

message StatsResponse {
  string short_code = 1;
  int64 total_clicks = 2;
  int64 unique_visitors = 3;
  google.protobuf.Timestamp last_clicked_at = 4;
}
